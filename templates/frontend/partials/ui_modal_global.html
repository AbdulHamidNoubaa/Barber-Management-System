<style>
.ui-modal {
  display: none !important;
  position: fixed;
  inset: 0;
  z-index: 4000;
  background: rgba(15, 23, 42, .55);
  backdrop-filter: blur(3px);
  align-items: center;
  justify-content: center;
  padding: .75rem;
}
.ui-modal.is-open {
  display: flex !important;
}
.ui-modal-box {
  background: #fff;
  border-radius: var(--radius-xl);
  width: min(960px, 100%);
  max-height: min(88vh, 860px);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(0, 0, 0, .2);
  animation: uiModalIn .2s ease;
}
@keyframes uiModalIn {
  from { opacity: 0; transform: scale(.96) translateY(8px); }
  to { opacity: 1; transform: none; }
}
.ui-modal-hd {
  flex-shrink: 0;
  padding: .75rem 1rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: .75rem;
  background: linear-gradient(180deg, #f8fafc, #fff);
}
.ui-modal-hd h3 { margin: 0; font-size: .95rem; font-weight: 900; }
.ui-modal-hd p { margin: .2rem 0 0; font-size: .72rem; color: var(--muted); }
.ui-modal-x {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: #fff;
  font-size: 1rem;
  line-height: 1;
  cursor: pointer;
  flex-shrink: 0;
}
.ui-modal-x:hover { background: var(--danger-light); border-color: #fca5a5; color: var(--danger); }
.ui-modal-bd {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: .85rem 1rem 1rem;
}
#ticketEditModal { z-index: 4100; }
.ticket-edit-svc-grid {
  display: flex;
  flex-wrap: wrap;
  gap: .4rem;
  max-height: 200px;
  overflow-y: auto;
  padding: .35rem 0;
}
.ticket-edit-svc-chip {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  padding: .35rem .55rem;
  border: 1.5px solid var(--border);
  border-radius: 999px;
  cursor: pointer;
  font-size: .72rem;
  font-weight: 700;
  background: #fff;
  user-select: none;
}
.ticket-edit-svc-chip:has(input:checked) {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.ticket-edit-svc-chip input { accent-color: var(--primary); }
.ticket-edit-svc-price { opacity: .75; font-size: .68rem; }
</style>
<script>
(function () {
  function closeUiModals() {
    document.querySelectorAll(".ui-modal.is-open").forEach(function (m) {
      m.classList.remove("is-open");
      m.setAttribute("hidden", "");
    });
    document.body.style.overflow = "";
  }
  window.closeUiModals = closeUiModals;

  document.querySelectorAll("[data-close-modal]").forEach(function (btn) {
    btn.addEventListener("click", closeUiModals);
  });
  document.querySelectorAll(".ui-modal").forEach(function (m) {
    m.addEventListener("click", function (e) {
      if (e.target === m) closeUiModals();
    });
  });
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closeUiModals();
  });
})();
</script>
